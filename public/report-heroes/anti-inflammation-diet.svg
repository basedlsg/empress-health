<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Empress Health report hero — Anti-inflammation Diet interlude -->
  <defs>
    <linearGradient id="bgFood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E5C8"/>
      <stop offset="100%" stop-color="#E0CFA8"/>
    </linearGradient>
    <radialGradient id="bowlShade" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fffaf1"/>
      <stop offset="100%" stop-color="#D6B783"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgFood)"/>
  <!-- Subtle scatter of grain marks for texture -->
  <g fill="#3f1449" opacity="0.06">
    <circle cx="120" cy="160" r="6"/>
    <circle cx="220" cy="240" r="4"/>
    <circle cx="320" cy="120" r="5"/>
    <circle cx="1380" cy="200" r="5"/>
    <circle cx="1480" cy="100" r="4"/>
    <circle cx="1320" cy="320" r="6"/>
    <circle cx="140" cy="700" r="5"/>
    <circle cx="1460" cy="780" r="6"/>
  </g>
  <!-- Bowl rim shadow -->
  <ellipse cx="800" cy="510" rx="450" ry="60" fill="#3f1449" opacity="0.18"/>
  <!-- Bowl body -->
  <path d="M360 460
           Q360 720 800 720
           Q1240 720 1240 460 Z" fill="url(#bowlShade)" stroke="#3f1449" stroke-width="4"/>
  <!-- Bowl rim -->
  <ellipse cx="800" cy="460" rx="440" ry="50" fill="#fffaf1" stroke="#3f1449" stroke-width="4"/>
  <!-- Greens (leafy) -->
  <g stroke="#27AE60" stroke-width="4" fill="#27AE60">
    <path d="M460 420 q40 -60 90 -40 q20 40 -10 70 q-50 20 -80 -30 z" opacity="0.8"/>
    <path d="M520 380 q50 -40 100 -10 q10 50 -40 70 q-60 0 -60 -60 z" opacity="0.65"/>
    <path d="M620 360 q50 -30 90 0 q10 50 -50 60 q-60 -10 -40 -60 z" opacity="0.75"/>
  </g>
  <!-- Berries (anthocyanin) -->
  <g fill="#C0392B">
    <circle cx="740" cy="410" r="22"/>
    <circle cx="780" cy="430" r="18" fill="#A32D2D"/>
    <circle cx="820" cy="405" r="20"/>
    <!-- Berry highlights -->
    <circle cx="735" cy="402" r="5" fill="#fffaf1" opacity="0.7"/>
    <circle cx="815" cy="398" r="4" fill="#fffaf1" opacity="0.7"/>
  </g>
  <!-- Tomato halves -->
  <g>
    <circle cx="900" cy="430" r="34" fill="#C0392B"/>
    <circle cx="900" cy="430" r="22" fill="#A32D2D"/>
    <g fill="#27AE60">
      <path d="M885 408 q5 -15 15 -10 q5 5 0 14 z"/>
      <path d="M910 408 q5 -15 15 -10 q5 5 0 14 z"/>
    </g>
  </g>
  <!-- Avocado slice -->
  <g transform="translate(1020 430)">
    <path d="M0 0 q30 -40 80 0 q-40 60 -80 0 z" fill="#27AE60" opacity="0.85"/>
    <ellipse cx="40" cy="0" rx="18" ry="14" fill="#3f1449" opacity="0.55"/>
    <ellipse cx="40" cy="-2" rx="10" ry="6" fill="#D8A738"/>
  </g>
  <!-- Salmon piece -->
  <g transform="translate(630 460)">
    <path d="M0 0 q40 -28 90 -8 q40 30 -10 50 q-60 18 -80 -42 z" fill="#E07B4A"/>
    <path d="M10 10 q40 -16 80 0 q-40 10 -80 0 z" fill="#fffaf1" opacity="0.7"/>
    <path d="M0 25 q40 -10 90 0 q-40 8 -90 0 z" fill="#fffaf1" opacity="0.5"/>
  </g>
  <!-- Nuts / seeds scatter -->
  <g fill="#D8A738">
    <ellipse cx="540" cy="500" rx="14" ry="9"/>
    <ellipse cx="980" cy="510" rx="12" ry="8"/>
    <ellipse cx="850" cy="520" rx="14" ry="9"/>
    <ellipse cx="1110" cy="490" rx="12" ry="8"/>
  </g>
  <!-- Olive oil drizzle (arcs above the bowl) -->
  <g fill="none" stroke="#D8A738" stroke-width="3" stroke-linecap="round" opacity="0.65">
    <path d="M650 350 q30 -40 70 -30 q40 10 60 50"/>
  </g>
  <!-- Turmeric/spice dusting -->
  <g fill="#D8A738">
    <circle cx="700" cy="370" r="3"/>
    <circle cx="900" cy="375" r="2"/>
    <circle cx="780" cy="365" r="2"/>
    <circle cx="820" cy="380" r="3"/>
    <circle cx="960" cy="395" r="2"/>
  </g>
  <!-- Tag bug -->
  <g transform="translate(80 60)" font-family="'Poppins', system-ui, sans-serif">
    <text font-size="18" font-weight="700" letter-spacing="5" fill="#3f1449" fill-opacity="0.65">EMPRESS HEALTH · ANTI-INFLAMMATION DIET</text>
  </g>
</svg>
