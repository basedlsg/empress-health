<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Empress Health report hero — Brain Fog interlude -->
  <defs>
    <linearGradient id="bgBrain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4E5C8"/>
      <stop offset="100%" stop-color="#E6D2A6"/>
    </linearGradient>
    <radialGradient id="haze" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffaf1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fffaf1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgBrain)"/>
  <!-- Fog ribbons in background -->
  <g fill="#fffaf1" opacity="0.55">
    <path d="M0 360 q200 -50 400 0 t400 0 t400 0 t400 0 L1600 410 L0 410 Z"/>
    <path d="M0 580 q260 -60 520 0 t520 0 t560 0 L1600 630 L0 630 Z" opacity="0.7"/>
  </g>
  <!-- Brain silhouette (stylised) -->
  <g transform="translate(800 460)" stroke="#3f1449" stroke-width="6" fill="#fffaf1">
    <!-- Outline -->
    <path d="M-260 -20
             c0 -80 60 -150 140 -160
             c40 -50 130 -50 170 0
             c40 -10 80 0 110 40
             c70 10 110 80 80 150
             c30 50 0 130 -70 140
             c-30 50 -100 60 -150 30
             c-40 30 -110 30 -150 -10
             c-80 0 -130 -80 -100 -150
             c-30 -10 -40 -30 -30 -40 z" stroke-linejoin="round"/>
    <!-- Inner brain folds -->
    <path d="M-220 -40 q40 -30 60 0 q-30 40 -20 80" fill="none" stroke-width="4"/>
    <path d="M-130 -110 q30 -20 60 -10 q10 50 -30 80" fill="none" stroke-width="4"/>
    <path d="M-20 -130 q40 -10 70 20 q-20 50 -40 60" fill="none" stroke-width="4"/>
    <path d="M120 -80 q40 0 60 40 q-30 40 -50 30" fill="none" stroke-width="4"/>
    <path d="M180 30 q40 20 30 80 q-50 10 -70 -30" fill="none" stroke-width="4"/>
    <path d="M50 80 q30 30 -10 60 q-50 0 -50 -40" fill="none" stroke-width="4"/>
    <path d="M-100 110 q-40 20 -80 0 q-10 -50 30 -70" fill="none" stroke-width="4"/>
    <path d="M-200 50 q-40 -20 -30 -70 q40 -10 50 10" fill="none" stroke-width="4"/>
    <!-- Center divide -->
    <path d="M0 -160 q-10 80 0 160 q-10 80 0 160" stroke="#3f1449" stroke-width="3" stroke-opacity="0.5" fill="none"/>
  </g>
  <!-- Fog overlay in front of brain (the "fog" itself) -->
  <ellipse cx="800" cy="460" rx="480" ry="180" fill="url(#haze)"/>
  <ellipse cx="600" cy="500" rx="280" ry="80" fill="#fffaf1" opacity="0.5"/>
  <ellipse cx="980" cy="420" rx="240" ry="60" fill="#fffaf1" opacity="0.55"/>
  <!-- Floating "?" marks suggesting word-finding -->
  <g fill="#C0392B" font-family="'Poppins', system-ui, sans-serif" font-weight="700" opacity="0.85">
    <text x="440" y="280" font-size="56">?</text>
    <text x="1180" y="240" font-size="76">?</text>
    <text x="1280" y="640" font-size="48">?</text>
    <text x="320" y="700" font-size="52">?</text>
  </g>
  <g transform="translate(80 60)" font-family="'Poppins', system-ui, sans-serif">
    <text font-size="18" font-weight="700" letter-spacing="5" fill="#3f1449" fill-opacity="0.65">EMPRESS HEALTH · BRAIN FOG</text>
  </g>
</svg>
