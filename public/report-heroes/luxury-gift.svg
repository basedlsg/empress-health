<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Empress Health report hero — Luxury Gift card -->
  <defs>
    <linearGradient id="bgGift" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8E5B8"/>
      <stop offset="100%" stop-color="#E0CFA8"/>
    </linearGradient>
    <linearGradient id="boxFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f1449"/>
      <stop offset="100%" stop-color="#2a0e30"/>
    </linearGradient>
    <linearGradient id="boxTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b2577"/>
      <stop offset="100%" stop-color="#3f1449"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGift)"/>
  <!-- Confetti / sparkle dots -->
  <g fill="#D8A738" opacity="0.55">
    <circle cx="240" cy="180" r="6"/>
    <circle cx="380" cy="120" r="4"/>
    <circle cx="1300" cy="220" r="5"/>
    <circle cx="1440" cy="160" r="6"/>
    <circle cx="180" cy="700" r="5"/>
    <circle cx="1480" cy="720" r="4"/>
    <circle cx="200" cy="380" r="3"/>
    <circle cx="1400" cy="420" r="4"/>
  </g>
  <g fill="#C0392B" opacity="0.5">
    <circle cx="320" cy="280" r="5"/>
    <circle cx="1240" cy="380" r="6"/>
    <circle cx="280" cy="540" r="4"/>
  </g>
  <!-- Surface shadow under box -->
  <ellipse cx="800" cy="740" rx="380" ry="40" fill="#3f1449" opacity="0.18"/>
  <!-- Gift box body -->
  <g transform="translate(800 530)">
    <!-- Box front -->
    <rect x="-280" y="-100" width="560" height="280" rx="10" fill="url(#boxFront)"/>
    <!-- Box top (slightly tilted slab) -->
    <path d="M-300 -120 L300 -120 L320 -100 L-280 -100 Z" fill="url(#boxTop)"/>
    <!-- Vertical ribbon -->
    <rect x="-30" y="-100" width="60" height="280" fill="#D8A738"/>
    <!-- Horizontal ribbon -->
    <rect x="-280" y="20" width="560" height="40" fill="#D8A738"/>
    <!-- Bow centre knot -->
    <ellipse cx="0" cy="-100" rx="46" ry="22" fill="#D8A738"/>
    <!-- Bow loops -->
    <path d="M-10 -120 q-130 -80 -100 -10 q-10 50 100 30 z" fill="#D8A738"/>
    <path d="M10 -120 q130 -80 100 -10 q10 50 -100 30 z" fill="#D8A738"/>
    <!-- Bow loop highlights -->
    <path d="M-30 -135 q-80 -50 -80 -10" fill="none" stroke="#fffaf1" stroke-width="2" stroke-opacity="0.55"/>
    <path d="M30 -135 q80 -50 80 -10" fill="none" stroke="#fffaf1" stroke-width="2" stroke-opacity="0.55"/>
    <!-- Bow trailing ribbons -->
    <path d="M-20 -88 q-60 80 -120 50 l 30 -30 z" fill="#D8A738"/>
    <path d="M20 -88 q60 80 120 50 l -30 -30 z" fill="#D8A738"/>
    <!-- Empress monogram on box front -->
    <g transform="translate(0 90)" text-anchor="middle" font-family="'Poppins', system-ui, sans-serif">
      <text font-size="22" font-weight="700" letter-spacing="6" fill="#D8A738">EMPRESS</text>
      <text y="26" font-size="12" font-weight="400" letter-spacing="3" fill="#fffaf1" fill-opacity="0.65">CURATED · $75</text>
    </g>
  </g>
  <!-- Small product silhouettes peeking from the side -->
  <g transform="translate(220 520)" stroke="#3f1449" stroke-width="3" fill="#fffaf1" opacity="0.92">
    <!-- Bottle 1 -->
    <rect x="0" y="60" width="60" height="160" rx="10"/>
    <rect x="20" y="40" width="20" height="30"/>
    <!-- Bottle 2 -->
    <rect x="84" y="40" width="56" height="180" rx="12" fill="#D8A738" opacity="0.85"/>
    <rect x="100" y="20" width="24" height="26" fill="#fffaf1"/>
  </g>
  <g transform="translate(1340 520)" stroke="#3f1449" stroke-width="3" fill="#fffaf1" opacity="0.92">
    <!-- Jar -->
    <rect x="0" y="80" width="80" height="140" rx="10"/>
    <rect x="-4" y="60" width="88" height="28" rx="6" fill="#D8A738"/>
  </g>
  <!-- Sparkle bursts (small stars) -->
  <g fill="#fffaf1" opacity="0.9">
    <g transform="translate(560 280)">
      <path d="M0 -16 L4 -4 L16 0 L4 4 L0 16 L-4 4 L-16 0 L-4 -4 Z"/>
    </g>
    <g transform="translate(1080 240)">
      <path d="M0 -12 L3 -3 L12 0 L3 3 L0 12 L-3 3 L-12 0 L-3 -3 Z"/>
    </g>
    <g transform="translate(1100 700)">
      <path d="M0 -10 L2.5 -2.5 L10 0 L2.5 2.5 L0 10 L-2.5 2.5 L-10 0 L-2.5 -2.5 Z"/>
    </g>
  </g>
  <g transform="translate(80 80)" font-family="'Poppins', system-ui, sans-serif">
    <text font-size="18" font-weight="700" letter-spacing="5" fill="#3f1449" fill-opacity="0.65">EMPRESS HEALTH · A LITTLE THANK-YOU</text>
  </g>
</svg>
